name: release

# Push to a release branch -> semantic-release computes the next version from the conventional
# commits, updates the changelog + package versions, publishes brain/cli/mcp to npm, and cuts a
# GitHub Release.
#
#   main  -> latest    beta -> beta dist-tag    alpha -> alpha dist-tag
#
# Use the manual "Run workflow" button (workflow_dispatch) with dry-run = true to preview the
# next version on any branch without publishing anything.

on:
  # TODO(v1 cutover): re-enable after the first manual 1.0.0 release is verified, so every merge to
  # a release branch publishes automatically. Kept off for now so merging this PR does not auto-fire
  # a release on the merge commit — the first release is driven manually via workflow_dispatch.
  # push:
  #   branches:
  #     - main
  #     - beta
  #     - alpha
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Preview the next release without publishing'
        type: boolean
        default: true

# Read-only by default; the release job opts into the write scopes it needs. Without this, jobs
# inherit the repository's default token scopes, so verify would run with more access than it uses.
permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Gate the release on the publishable artifacts being sound. semantic-release pushes the tag +
  # release commit BEFORE it publishes to npm, so a failure mid-release would leave a dangling tag;
  # validating up front avoids that half-released state. Skipped for dry-run previews.
  verify:
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry-run) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
      # brain's unit tests run in a real browser via Vitest browser mode, so Chromium must be present.
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: playwright-${{ runner.os }}-
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Lint
        run: pnpm run lint
      - name: Build publishable libs
        run: pnpm nx run-many -t build -p brain cli mcp --parallel=1
      - name: Unit test publishable libs
        run: pnpm nx run-many -t test -p brain cli mcp --parallel=3
      - name: CLI smoke
        run: pnpm nx run cli-smoke:smoke

  release:
    needs: [verify]
    # Run when verify passed (push / real dispatch) or was skipped (dry-run preview), but never
    # when it failed or was cancelled.
    if: ${{ always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # create tags, commits and GitHub Releases
      issues: write # semantic-release comments on released issues
      pull-requests: write # semantic-release comments on released PRs
      id-token: write # npm trusted publishing (OIDC)
    steps:
      # Mint a short-lived token from the release GitHub App. It is a bypass actor on the branch
      # ruleset, so semantic-release can push the release commit + tag even when PRs are required.
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ steps.app-token.outputs.token }}
      - name: Install pnpm
        uses: pnpm/action-setup@v5
      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'
      - name: Upgrade npm for trusted publishing
        run: npm i -g npm@^11.5.1
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
      - name: Release
        run: |
          unset NODE_AUTH_TOKEN
          unset NPM_TOKEN
          pnpm semantic-release ${{ (github.event_name == 'workflow_dispatch' && inputs.dry-run) && '--dry-run' || '' }}
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          # Enable npm provenance only for the real release (OIDC id-token is available here). Keeping
          # it out of publishConfig means local/verdaccio publishes — e.g. cli-smoke — don't attempt
          # provenance and fail without an id-token.
          NPM_CONFIG_PROVENANCE: 'true'
